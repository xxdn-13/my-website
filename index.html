<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻星空旋转相册</title>
    <style>
        /* --- 1. 基础设置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* 梦幻渐变背景 */
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364); /* 深海蓝调 */
            font-family: 'Segoe UI', sans-serif;
            perspective: 1000px; /* 3D 透视 */
        }

        /* --- 2. 粒子背景层 --- */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- 3. 3D 相册场景 --- */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* 旋转容器 */
        .carousel {
            position: relative;
            width: 220px;
            height: 320px;
            transform-style: preserve-3d;
            animation: rotateScene 25s linear infinite;
        }

        /* 图片卡片样式 */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            /* 玻璃质感边框 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            /* 图片稍微透明一点，显得更有空气感 */
            opacity: 0.9;
            transition: all 0.3s ease;
            backface-visibility: hidden; /* 隐藏背面，性能优化 */
        }

        .card:hover {
            opacity: 1;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
            z-index: 100; /* 悬停时层级提高 */
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 图片内部添加一个渐变遮罩，增加层次感 */
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        /* --- 4. 动画定义 --- */

        /* 整体旋转动画 */
        @keyframes rotateScene {
            from { transform: rotateY(0deg); }
            to   { transform: rotateY(360deg); }
        }

        /* 单个卡片的悬浮动画（让旋转不那么生硬） */
        /* 注意：这个动画需要通过 JS 动态注入或者在生成元素时处理延迟 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- 5. 点击星星特效样式 --- */
        .star {
            position: absolute;
            pointer-events: none; /* 让鼠标事件穿透星星 */
            animation: fadeOut 1s ease-out forwards;
            z-index: 9999;
        }

        @keyframes fadeOut {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(2) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<!-- 粒子背景 -->
<div id="particles-js"></div>

<!-- 3D 相册 -->
<div class="scene">
    <div class="carousel" id="carousel">
        <!-- 图片将通过 JS 生成 -->
    </div>
</div>

<!-- 引入粒子库 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<script>
    // ================= 配置部分 =================

    // 1. 粒子背景配置 (梦幻气泡风格)
    particlesJS('particles-js', {
        particles: {
            number: { value: 60, density: { enable: true, value_area: 800 } },
            color: { value: "#ffffff" },
            shape: { type: "circle" }, // 圆形粒子
            opacity: { value: 0.5, random: true },
            size: { value: 4, random: { enable: true, minimum: 2 } }, // 大小不一
            line_linked: { enable: false }, // 关闭连线，更干净
            move: {
                enable: true,
                speed: 1.5, // 慢速漂浮
                direction: "top", // 向上漂浮
                random: true,
                straight: false,
                out_mode: "out",
                bounce: false,
            }
        },
        interactivity: {
            detect_on: "canvas",
            events: {
                onhover: { enable: true, mode: "bubble" }, // 鼠标悬停产生气泡
                onclick: { enable: true, mode: "push" },
                resize: true
            },
            modes: {
                bubble: { distance: 200, size: 8, duration: 2, opacity: 0.8, speed: 3 },
                push: { particles_nb: 4 }
            }
        },
        retina_detect: true
    });

    // 2. 生成 3D 图片 (修改了图片路径)
    const carousel = document.getElementById('carousel');
    // 修改这里的数量，必须和你放入的图片数量一致
    const imgCount = 10;
    const radius = 380;

    for (let i = 1; i <= imgCount; i++) { // 注意这里从 1 开始
        const card = document.createElement('div');
        card.className = 'card';

        const img = document.createElement('img');

        // 🔥 核心修改：指向本地文件夹
        // 请确保你的图片格式是 jpg，如果是 png，请改为 .png
        img.src = `img/${i}.jpg`;

        // 为了防止图片加载慢出现空白，可以添加错误处理
        img.onerror = function() {
            console.log(`图片加载失败: img/${i}.jpg`);
            // 可以设置一个默认的占位图
            // this.src = 'img/placeholder.jpg';
        };

        card.appendChild(img);

        const angle = (360 / imgCount) * (i - 1); // 计算角度
        card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
        carousel.appendChild(card);
    }


    // 3. 点击冒星星特效
    document.addEventListener('click', function(e) {
        createStars(e.clientX, e.clientY);
    });

    function createStars(x, y) {
        const starCount = 12; // 每次点击生成的星星数量
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            document.body.appendChild(star);

            // 随机星星颜色 (金色、粉色、白色)
            const colors = ['#FFD700', '#FF69B4', '#FFFFFF', '#00FFFF'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            // 设置星星内容 (使用 ✦ 或 ★ 符号，或者用 SVG)
            star.innerHTML = '✦';
            star.style.color = randomColor;
            star.style.fontSize = Math.random() * 20 + 10 + 'px'; // 随机大小

            // 初始位置
            star.style.left = x + 'px';
            star.style.top = y + 'px';

            // 随机散开方向
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 100 + 50; // 散开距离
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;

            // 使用 Web Animations API 进行更复杂的动画控制
            star.animate([
                { transform: 'translate(0, 0) scale(0)', opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) scale(1.5)`, opacity: 0 }
            ], {
                duration: 800 + Math.random() * 400,
                easing: 'cubic-bezier(0, .9, .57, 1)',
            }).onfinish = () => {
                star.remove(); // 动画结束后移除元素
            };
        }
    }
</script>
</body>
</html>

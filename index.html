<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* 全局样式重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 卡片容器 */
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }

        /* 头像样式 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* 文字排版 */
        h1 { font-size: 24px; margin-bottom: 10px; color: #2d3436; }
        p { color: #636e72; line-height: 1.6; margin-bottom: 30px; }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn:hover { background: #5b4bc4; }

        /* 简单的页脚 */
        .footer { margin-top: 20px; font-size: 12px; color: #b2bec3; }
    </style>
</head>
<body>

    <div class="card">
        <!-- 这里的 src 是你的 GitHub 头像地址，你可以换成自己的图片链接 -->
        <img src="https://avatars.githubusercontent.com/u/YOUR_GITHUB_ID" alt="头像" class="avatar">
        
        <!-- 你的名字 -->
        <h1>你好，我是 [你的名字]</h1>
        
        <!-- 你的简介 -->
        <p>
            欢迎来到我的个人网站！<br>
            这是一个基于 Cloudflare Pages 部署的静态页面。<br>
            热爱编程，热爱生活。🚀
        </p>

        <!-- 按钮链接 -->
        <a href="https://github.com/你的用户名" class="btn">联系我</a>

        <div class="footer">
            &copy; 2026 My Website
        </div>
    </div>

</body>
</html>

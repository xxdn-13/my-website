<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 旋转相册 - 粒子背景版</title>
    <style>
        /* 1. 基础重置与背景设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 防止出现滚动条 */
            background: radial-gradient(circle, #1a1a2e, #16213e); /* 深色渐变背景，衬托粒子 */
            font-family: sans-serif;
        }

        /* 2. 粒子背景容器 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* 背景层级 */
        }

        /* 3. 3D 相册容器 */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* 内容层级 */
            perspective: 1000px; /* 关键：设置透视深度，产生3D感 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 4. 旋转的盒子 */
        .carousel {
            width: 200px; /* 图片宽度 */
            height: 300px; /* 图片高度 */
            position: relative;
            transform-style: preserve-3d; /* 关键：保留子元素的3D空间 */
            animation: rotate 20s linear infinite; /* 动画：20秒一圈，线性匀速，无限循环 */
        }

        /* 鼠标悬停时暂停动画 */
        .carousel:hover {
            animation-play-state: paused;
        }

        /* 5. 图片样式 */
        .carousel .item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px; /* 圆角 */
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); /* 发光边框 */
            /* 
               注意：这里使用了占位图服务。
               如果你有本地图片，请修改 src 属性。
            */
            background-color: rgba(255, 255, 255, 0.1); /* 图片加载前的背景色 */
            backface-visibility: visible; /* 确保背面也能显示（虽然这里主要看正面） */
        }

        .carousel .item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持图片比例填充 */
        }

        /* 6. 关键帧动画定义 */
        @keyframes rotate {
            from {
                transform: rotateY(0deg);
            }
            to {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- 粒子背景层 -->
    <div id="particles-js"></div>

    <!-- 3D 相册层 -->
    <div class="scene">
        <div class="carousel" id="carousel-container">
            <!-- 图片将通过 JS 动态生成，也可以手动写在这里 -->
        </div>
    </div>

    <!-- 引入 particles.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

    <script>
        // --- 第一部分：配置粒子背景 ---
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 80, density: { enable: true, value_area: 800 } },
                        color: { value: "#ffffff" },
                        shape: { type: "circle" },
                        opacity: { value: 0.5, random: true },
                        size: { value: 3, random: true },
                        line_linked: {
                            enable: true,
                            distance: 150,
                            color: "#ffffff",
                            opacity: 0.4,
                            width: 1
                        },
                        move: {
                            enable: true,
                            speed: 2,
                            direction: "none",
                            random: true,
                            straight: false,
                            out_mode: "out",
                            bounce: false,
                        }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: {
                            onhover: { enable: true, mode: "grab" }, // 鼠标悬停吸引粒子
                            onclick: { enable: true, mode: "push" }, // 点击添加粒子
                            resize: true
                        },
                        modes: {
                            grab: { distance: 140, line_linked: { opacity: 0.8 } },
                            push: { particles_nb: 4 }
                        }
                    },
                    retina_detect: true
                });
            }
        });

        // --- 第二部分：生成 3D 图片排列 ---
        const container = document.getElementById('carousel-container');
        const imageCount = 10;
        const radius = 350; // 旋转半径，数值越大，图片离中心越远

        for (let i = 0; i < imageCount; i++) {
            const item = document.createElement('div');
            item.className = 'item';
            
            // 创建图片元素 (这里使用随机风景图作为演示，请替换为你自己的图片路径)
            const img = document.createElement('img');
            img.src = `https://picsum.photos/200/300?random=${i}`; 
            item.appendChild(img);

            // 核心数学逻辑：
            // 360度 / 10张图 = 每张图间隔 36度
            const angle = (360 / imageCount) * i;
            
            // 设置 CSS 3D 变换：先旋转角度，再沿 Z 轴推出
            item.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
            
            container.appendChild(item);
        }
    </script>
</body>
</html>
